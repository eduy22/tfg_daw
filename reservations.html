<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservar instalación - Ciudad Deportiva</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header>
    <h1>Ciudad Deportiva</h1>
    <p>Reserva tu instalación deportiva</p>
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="register.html">Registrarse</a>
    <a href="login.html">Iniciar sesión</a>
    <a href="facilities.html">Instalaciones</a>
    <a href="reservations.html">Reservar</a>
    <a href="my_reservations.html">Mis reservas</a>
  </nav>

  <main>
    <div class="card" id="userCard" style="display:none;">
      <h2 id="hello"></h2>
      <p>Selecciona una instalación, fecha y hora para realizar la reserva.</p>
    </div>

    <div class="card">
      <h2>Nueva reserva</h2>
      <form id="reservationForm">
        <label for="id_instalacion">Instalación</label><br>
        <select id="id_instalacion" required style="width:100%; padding:0.5rem;">
          <option value="">Cargando instalaciones...</option>
        </select><br><br>

        <label for="fecha">Fecha</label><br>
        <input id="fecha" type="date" required style="width:100%; padding:0.5rem;"><br><br>

        <label for="hora_inicio">Hora de inicio</label><br>
        <select id="hora_inicio" required style="width:100%; padding:0.5rem;">
          <option value="">Selecciona una hora</option>
          <option value="10:00">10:00</option>
          <option value="11:00">11:00</option>
          <option value="12:00">12:00</option>
          <option value="13:00">13:00</option>
          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
          <option value="17:00">17:00</option>
          <option value="18:00">18:00</option>
          <option value="19:00">19:00</option>
          <option value="20:00">20:00</option>
        </select><br><br>
        <button id="btnSubmit" type="submit">Reservar</button>
      </form>

      <br>
      <div id="status" style="display:none;"></div>
    </div>
  </main>

  <footer>
    Ciudad deportiva
  </footer>

<script src="assets/reservations.js"></script>

</body>
</html>
