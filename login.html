<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Ciudad Deportiva</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header>
    <h1>Ciudad Deportiva</h1>
    <p>Inicio de sesión</p>
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="register.html">Registrarse</a>
    <a href="login.html">Iniciar sesión</a>
    <a href="facilities.html">Instalaciones</a>
    <a href="reservations.html">Reservar</a>
    <a href="my_reservations.html">Mis reservas</a>
  </nav>

  <main>
    <div class="card">
      <h2>Acceder</h2>
      <p>Introduce tus credenciales.</p>
      <br>

      <form id="loginForm">
        <label>Email</label><br>
        <input id="email" type="email" required style="width:100%; padding:0.5rem;"><br><br>

        <label>Contraseña</label><br>
        <input id="password" type="password" required style="width:100%; padding:0.5rem;"><br><br>

        <button id="btnSubmit" type="submit">Iniciar sesión</button>
      </form>

      <br>
      <div id="msg" class="card" style="display:none;"></div>
    </div>
  </main>

  <footer>
    Proyecto DAW - Sprint 2
  </footer>

<script>
  const form = document.getElementById('loginForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btnSubmit');

  function showMessage(text, ok=true) {
    msg.style.display = 'block';
    msg.textContent = text;
    msg.style.borderLeft = ok ? '6px solid #16a34a' : '6px solid #dc2626';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showMessage('Introduce email y contraseña.', false);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando...';
    msg.style.display = 'none';

    try {
      const res = await fetch('/ciudad_deportiva/api/auth_login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        credentials: 'include'
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        // Guardamos información básica para UX
        localStorage.setItem('cd_user', JSON.stringify(data.user));
        showMessage('Login correcto. Redirigiendo...', true);

        setTimeout(() => {
          window.location.href = 'facilities.html';
        }, 700);
      } else {
        showMessage(data.error || 'Error en el login.', false);
      }
    } catch (err) {
      showMessage('Error de conexión con el servidor.', false);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  });
</script>

</body>
</html>
