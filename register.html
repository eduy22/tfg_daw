<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Ciudad Deportiva</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header>
    <h1>Ciudad Deportiva</h1>
    <p>Crea tu cuenta para comenzar a reservar</p>
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="register.html">Registrarse</a>
    <a href="login.html">Iniciar sesión</a>
    <a href="facilities.html">Instalaciones</a>
    <a href="reservations.html">Reservar</a>
    <a href="my_reservations.html">Mis reservas</a>
  </nav>

  <main>
    <div class="card">
      <h2>Crear cuenta</h2>
      <p>Completa el formulario para crear tu cuenta.</p>
      <br>

      <form id="registerForm">
        <label>Nombre</label><br>
        <input id="nombre" type="text" required style="width:100%; padding:0.5rem;"><br><br>

        <label>Email</label><br>
        <input id="email" type="email" required style="width:100%; padding:0.5rem;"><br><br>

        <label>Contraseña</label><br>
        <input id="password" type="password" required minlength="4" style="width:100%; padding:0.5rem;"><br><br>

        <button id="btnSubmit" type="submit">Registrar</button>
      </form>

      <br>
      <div id="msg" class="card" style="display:none;"></div>
    </div>
  </main>

  <footer>
    Ciudad deportiva
  </footer>

<script src="assets/register.js"></script>

</body>
</html>
