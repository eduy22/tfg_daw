<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis reservas - Ciudad Deportiva</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header>
    <h1>Ciudad Deportiva</h1>
    <p>Mis reservas</p>
  </header>

  <nav>
    <a href="index.html">Inicio</a>
    <a href="register.html">Registrarse</a>
    <a href="login.html">Iniciar sesión</a>
    <a href="facilities.html">Instalaciones</a>
    <a href="reservations.html">Reservar</a>
    <a href="my_reservations.html">Mis reservas</a>
  </nav>

  <main>
    <div class="card" id="userCard" style="display:none;">
      <h2 id="hello"></h2>
      <p>Aquí puedes consultar tus reservas registradas.</p>
    </div>

    <div class="card">
      <h2>Listado de mis reservas</h2>
      <p>Datos obtenidos desde el backend.</p>
      <br>

      <div id="status" style="display:none;"></div>
      <div id="list"></div>
    </div>
  </main>

  <footer>
    Proyecto DAW - Sprint 3
  </footer>

<script>
  const listEl = document.getElementById('list');
  const statusEl = document.getElementById('status');
  const userCard = document.getElementById('userCard');
  const hello = document.getElementById('hello');

  function setStatus(text, ok=true) {
    statusEl.style.display = 'block';
    statusEl.textContent = text;
    statusEl.style.padding = '0.6rem';
    statusEl.style.marginBottom = '1rem';
    statusEl.style.borderRadius = '6px';
    statusEl.style.background = ok ? '#dcfce7' : '#fee2e2';
    statusEl.style.borderLeft = ok ? '6px solid #16a34a' : '6px solid #dc2626';
  }

  function renderReservations(items) {
    listEl.innerHTML = '';

    if (!items.length) {
      listEl.innerHTML = '<p>No tienes reservas registradas.</p>';
      return;
    }

    items.forEach(r => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <h3>${r.instalacion}</h3>
        <p><strong>Tipo:</strong> ${r.tipo}</p>
        <p><strong>Fecha:</strong> ${r.fecha}</p>
        <p><strong>Hora:</strong> ${r.hora_inicio}</p>
        <p><strong>Estado:</strong> ${r.estado}</p>
      `;
      listEl.appendChild(div);
    });
  }

  const stored = localStorage.getItem('cd_user');
  if (stored) {
    try {
      const user = JSON.parse(stored);
      userCard.style.display = 'block';
      hello.textContent = `Hola, ${user.nombre}`;
    } catch (_) {}
  }

  async function loadReservations() {
    setStatus('Cargando reservas...', true);

    try {
      const res = await fetch('/ciudad_deportiva/api/reservations_my.php', {
        method: 'GET',
        credentials: 'include'
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        setStatus('Reservas cargadas correctamente.', true);
        renderReservations(data.reservas || []);
      } else {
        setStatus(data.error || 'Error al cargar las reservas.', false);
      }
    } catch (err) {
      setStatus('Error de conexión con el servidor.', false);
    }
  }

  loadReservations();
</script>

</body>
</html>
