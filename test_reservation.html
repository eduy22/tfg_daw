<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Reserva</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header>
    <h1>Prueba de reserva</h1>
    <p>Sprint 3 - Backend de reservas</p>
  </header>

  <main>
    <div class="card">
      <h2>Crear reserva</h2>

      <form id="reservationForm">
        <label>Instalación (ID)</label><br>
        <input id="id_instalacion" type="number" required style="width:100%; padding:0.5rem;"><br><br>

        <label>Fecha</label><br>
        <input id="fecha" type="date" required style="width:100%; padding:0.5rem;"><br><br>

        <label>Hora inicio</label><br>
        <input id="hora_inicio" type="time" required style="width:100%; padding:0.5rem;"><br><br>

        <button id="btnSubmit" type="submit">Reservar</button>
      </form>

      <br>
      <div id="msg" class="card" style="display:none;"></div>
    </div>
  </main>

<script>
  const form = document.getElementById('reservationForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btnSubmit');

  function showMessage(text, ok=true) {
    msg.style.display = 'block';
    msg.textContent = text;
    msg.style.borderLeft = ok ? '6px solid #16a34a' : '6px solid #dc2626';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const id_instalacion = Number(document.getElementById('id_instalacion').value);
    const fecha = document.getElementById('fecha').value;
    const hora_inicio = document.getElementById('hora_inicio').value;

    btn.disabled = true;
    btn.textContent = 'Reservando...';
    msg.style.display = 'none';

    try {
      const res = await fetch('/ciudad_deportiva/api/reservations_create.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ id_instalacion, fecha, hora_inicio })
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        showMessage('Reserva creada correctamente.', true);
        form.reset();
      } else {
        showMessage(data.error || 'Error al crear la reserva.', false);
      }
    } catch (err) {
      showMessage('Error de conexión con el servidor.', false);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Reservar';
    }
  });
</script>

</body>
</html>
